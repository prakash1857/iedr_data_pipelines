resources:
  pipelines:
    pipeline_iedr_pipeline:
      name: IEDR Pipeline
      configuration:
        catalog: ${var.catalog}
        pipelines.maxFlowRetryAttempts: "1"
        pipelines.numUpdateRetryAttempts: "1"
      libraries:
        - glob:
            include: ../../src/pipelines/IEDR_Pipeline/transformations/**
      schema: silver
      continuous: false
      development: false
      photon: true
      channel: CURRENT
      catalog: iedr
      serverless: true
      root_path: ../../src/pipelines/IEDR_Pipeline
