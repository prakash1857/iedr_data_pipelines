resources:
  pipelines:
    pipeline_iedr_pipeline:
      name: IEDR Pipeline
      configuration:
        catalog: ${var.catalog}
        table_list: ${var.table_list}
        utility_list: ${var.utility_list}
      libraries:
        - glob:
            include: ../../src/pipelines/IEDR_Pipeline/transformations/**
      schema: silver
      continuous: false
      development: false
      photon: true
      channel: CURRENT
      catalog: iedr
      serverless: true
      root_path: ../../src/pipelines/IEDR_Pipeline
