# This is a Databricks asset bundle definition for iedr_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: iedr_project
  uuid: 67856603-02b4-4a40-87b3-676dbf0d9431

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets:
      name_prefix: dev_${workspace.current_user.short_name}
      source_linked_deployment: false
    workspace:
      host: https://dbc-8bd3ea9d-cb6c.cloud.databricks.com
    variables:
      catalog: iedr
  prod:
    mode: production
    workspace:
      host: https://dbc-8bd3ea9d-cb6c.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/prakash1857@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/prakash1857@gmail.com/PROD/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: prod_iedr
    permissions:
      - group_name: admins
        level: CAN_MANAGE
